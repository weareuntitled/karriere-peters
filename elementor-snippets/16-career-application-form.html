<!-- ============================================
     CAREER APPLICATION FORM - Glassmorphism
     Für Elementor: Einfügen als HTML-Widget
     ============================================ -->

<style>
    .sp-apply-container {
        max-width: 1280px;
        margin: 0 auto;
        padding: 0 32px;
    }
    
    .sp-apply-header {
        text-align: center;
        margin-bottom: 48px;
    }
    
    .sp-apply-header h2 {
        font-family: 'DM Sans', sans-serif;
        font-size: 32px;
        font-weight: 600;
        line-height: 1.3;
        letter-spacing: -0.01em;
        color: #1a1c1e;
        margin-bottom: 16px;
    }
    
    .sp-apply-header p {
        font-family: 'DM Sans', sans-serif;
        font-size: 16px;
        line-height: 1.6;
        color: #404751;
        max-width: 600px;
        margin: 0 auto;
    }
    
    /* Form Card */
    .sp-apply-card {
        max-width: 800px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 8px 32px rgba(0, 113, 188, 0.08);
    }
    
    .sp-form-group {
        margin-bottom: 20px;
    }
    
    .sp-form-group label {
        display: block;
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        font-weight: 600;
        color: #1a1c1e;
        margin-bottom: 8px;
    }
    
    .sp-form-group input,
    .sp-form-group textarea,
    .sp-form-group select {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #c0c7d3;
        border-radius: 8px;
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        transition: all 0.3s ease;
        background: rgba(255, 255, 255, 0.5);
    }
    
    .sp-form-group input:focus,
    .sp-form-group textarea:focus,
    .sp-form-group select:focus {
        border-color: #0071bc;
        box-shadow: 0 0 0 3px rgba(0, 113, 188, 0.1);
        outline: none;
        background: rgba(255, 255, 255, 0.8);
    }
    
    .sp-form-group textarea {
        min-height: 120px;
        resize: vertical;
    }
    
    .sp-submit-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 16px 32px;
        background: #0071bc;
        color: white;
        border: none;
        border-radius: 9999px;
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.05em;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 16px rgba(0, 113, 188, 0.2);
    }
    
    .sp-submit-btn:hover {
        background: #005894;
        transform: translateY(-2px);
        box-shadow: 0 6px 24px rgba(0, 113, 188, 0.3);
    }
    
    /* Responsive */
    @media (max-width: 1024px) {
        .sp-apply-header h2 {
            font-size: 28px;
        }
    }
    
    @media (max-width: 768px) {
        .sp-apply-container {
            padding: 0 16px;
        }
        
        .sp-apply-header {
            margin-bottom: 32px;
        }
        
        .sp-apply-header h2 {
            font-size: 28px;
        }
        
        .sp-apply-card {
            padding: 24px;
        }
    }
    
    @media (max-width: 640px) {
        .sp-apply-header h2 {
            font-size: 26px;
        }
        
        .sp-apply-header p {
            font-size: 15px;
        }
        
        .sp-apply-card {
            padding: 20px;
        }
    }
    
    @media (max-width: 480px) {
        .sp-apply-card {
            padding: 16px;
            border-radius: 12px;
        }
        
        .sp-apply-header h2 {
            font-size: 24px;
        }
        
        .sp-form-group label {
            font-size: 13px;
        }
        
        .sp-form-group input,
        .sp-form-group textarea,
        .sp-form-group select {
            padding: 10px 14px;
            font-size: 13px;
        }
        
        .sp-submit-btn {
            padding: 14px 24px;
            font-size: 13px;
        }
    }
    
    @media (max-width: 360px) {
        .sp-apply-header h2 {
            font-size: 22px;
        }
    }
</style>

<div class="sp-apply-container">
    <div class="sp-apply-header">
        <h2>Jetzt bewerben</h2>
        <p>Werden Sie Teil unseres Teams – wir freuen uns auf Ihre Bewerbung.</p>
    </div>
    
    <div class="sp-apply-card">
        <form>
            <div class="sp-form-group">
                <label>Vollständiger Name</label>
                <input type="text" placeholder="Ihr Name" required>
            </div>
            
            <div class="sp-form-group">
                <label>E-Mail</label>
                <input type="email" placeholder="ihre@email.de" required>
            </div>
            
            <div class="sp-form-group">
                <label>Telefon</label>
                <input type="tel" placeholder="+49 ...">
            </div>
            
            <div class="sp-form-group">
                <label>Position</label>
                <select>
                    <option>Spengler-Geselle</option>
                    <option>Folientechniker</option>
                    <option>Dachdecker</option>
                </select>
            </div>
            
            <div class="sp-form-group">
                <label>Anschreiben</label>
                <textarea placeholder="Erzählen Sie uns von sich..."></textarea>
            </div>
            
            <div class="sp-form-group">
                <label>Lebenslauf (PDF)</label>
                <input type="file" accept=".pdf">
            </div>
            
            <button type="submit" class="sp-submit-btn">
                Bewerbung absenden
                <span class="material-symbols-outlined">send</span>
            </button>
        </form>
    </div>
</div>

<!-- Material Symbols Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
