<!-- ============================================
     CONTACT MAP - Liquid Glass Overlay (iOS 26)
     Using Proper Liquid Glass System Classes
     ============================================ -->

<style>
    /* === Import Design System === */
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap');
    
    .sp-map-container {
        max-width: var(--content-max-width-lg);
        margin: 0 auto;
        padding: 0 32px;
    }
    
    .sp-map-header {
        text-align: center;
        margin-bottom: 48px;
    }
    
    .sp-map-header h2 {
        font-family: var(--font-family-base);
        font-size: var(--type-h2-size);
        font-weight: var(--type-h2-weight);
        line-height: var(--type-h2-line-height);
        letter-spacing: var(--type-h2-letter-spacing);
        color: var(--text-primary);
        margin-bottom: 16px;
    }
    
    .sp-map-header p {
        font-family: var(--font-family-base);
        font-size: var(--type-body-lg-size);
        line-height: var(--line-height-relaxed);
        color: var(--text-secondary);
        max-width: var(--content-max-width-sm);
        margin: 0 auto;
    }
    
    /* === Map Wrapper === */
    .sp-map-wrapper {
        position: relative;
        width: 100%;
        height: 500px;
        border-radius: var(--radius-2xl);
        overflow: hidden;
        border: 1px solid var(--border-accent);
        box-shadow: var(--shadow-md);
        
        /* Apply glass material to wrapper */
        background: var(--glass-bg-light);
        backdrop-filter: blur(var(--glass-blur-light));
        -webkit-backdrop-filter: blur(var(--glass-blur-light));
    }
    
    .sp-map-wrapper iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
    
    /* === OVERLAY - NOW USING GLASS-OVERLAY FROM SYSTEM === */
    .sp-map-overlay {
        /* Use glass-overlay class from liquid-glass-system.css */
        position: absolute;
        bottom: 24px;
        left: 24px;
        right: 24px;
        
        /* Apply Liquid Glass styling */
        background: var(--glass-bg-heavy);
        backdrop-filter: blur(var(--glass-blur-heavy));
        -webkit-backdrop-filter: blur(var(--glass-blur-heavy));
        border: 1px solid var(--glass-border-medium);
        border-radius: var(--radius-xl);
        padding: 24px;
        box-shadow: var(--glass-shadow-heavy);
        
        transform: translateY(100%);
        opacity: 0;
        transition: var(--transition-normal);
    }
    
    .sp-map-wrapper:hover .sp-map-overlay {
        transform: translateY(0);
        opacity: 1;
    }
    
    .sp-map-overlay h3 {
        font-family: var(--font-family-base);
        font-size: var(--type-h3-size);
        font-weight: var(--type-h3-weight);
        color: var(--text-primary);
        margin-bottom: 12px;
    }
    
    .sp-map-overlay p {
        font-family: var(--font-family-base);
        font-size: var(--font-size-base);
        line-height: 1.6;
        color: var(--text-secondary);
        margin: 0;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
    }
    
    .sp-map-overlay p:last-child {
        margin-bottom: 0;
    }
    
    .sp-map-overlay .material-symbols-outlined {
        font-size: 18px;
        color: var(--brand-primary);
    }
    
    .sp-map-divider {
        width: 40px;
        height: 2px;
        background: linear-gradient(to right, var(--brand-primary), transparent);
        margin: 16px 0;
    }
    
    /* === Responsive === */
    @media (max-width: 1024px) {
        .sp-map-wrapper {
            height: 400px;
        }
    }
    
    @media (max-width: 768px) {
        .sp-map-container {
            padding: 0 16px;
        }
        
        .sp-map-header {
            margin-bottom: 32px;
        }
        
        .sp-map-header h2 {
            font-size: var(--font-size-2xl);
        }
        
        .sp-map-wrapper {
            height: 350px;
            border-radius: var(--radius-xl);
        }
        
        .sp-map-overlay {
            bottom: 16px;
            left: 16px;
            right: 16px;
            padding: 20px;
            border-radius: var(--radius-lg);
        }
    }
    
    @media (max-width: 640px) {
        .sp-map-header h2 {
            font-size: var(--font-size-xl);
        }
        
        .sp-map-header p {
            font-size: var(--font-size-base);
        }
    }
    
    @media (max-width: 480px) {
        .sp-map-wrapper {
            height: 250px;
            border-radius: var(--radius-lg);
        }
        
        .sp-map-overlay {
            position: relative;
            bottom: auto;
            left: auto;
            right: auto;
            margin-top: 16px;
            border-radius: var(--radius-md);
        }
        
        .sp-map-overlay h3 {
            font-size: var(--font-size-md);
        }
        
        .sp-map-overlay p {
            font-size: var(--font-size-sm);
        }
    }
    
    @media (max-width: 360px) {
        .sp-map-header h2 {
            font-size: var(--font-size-xl);
        }
    }
</style>

<!-- Material Symbols -->
