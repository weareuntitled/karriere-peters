<!-- ============================================
     GLASS MODAL - iOS 26 Liquid Glass Style
     Using Proper Liquid Glass System Classes
     ============================================ -->

<style>
    /* === Use Liquid Glass System Classes === */
    .glass-modal-demo {
        /* Equivalent to sp-404-container */
        position: relative;
        min-height: 90vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
        overflow: hidden;
        background: var(--surface-primary);
    }
    
    .glass-modal-content-demo {
        /* Equivalent to sp-404-content - uses glass-modal from system */
        position: relative;
        z-index: var(--z-modal-content);
        text-align: center;
        max-width: 600px;
        width: 100%;
        
        /* Apply Liquid Glass Material */
        background: var(--glass-bg-heavy);
        backdrop-filter: blur(var(--glass-blur-heavy));
        -webkit-backdrop-filter: blur(var(--glass-blur-heavy));
        border: 1px solid var(--glass-border-medium);
        border-radius: var(--radius-2xl);
        padding: 64px 48px;
        box-shadow: var(--glass-shadow-extreme);
        
        animation: glassModalReveal 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    @keyframes glassModalReveal {
        0% {
            opacity: 0;
            transform: scale(0.95) translateY(20px);
        }
        100% {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
    }
    
    .glass-modal-code {
        /* Equivalent to sp-404-code */
        font-family: var(--font-family-base);
        font-size: var(--font-size-3xl);
        font-weight: var(--font-weight-extrabold);
        line-height: 1;
        color: var(--brand-primary);
        margin-bottom: 16px;
        text-shadow: var(--shadow-sm);
    }
    
    .glass-modal-code:hover {
        transform: scale(1.02);
        transition: transform var(--transition-fast);
    }
    
    .glass-modal-content-demo h1 {
        font-family: var(--font-family-base);
        font-size: var(--type-h1-size);
        font-weight: var(--type-h1-weight);
        line-height: var(--type-h1-line-height);
        letter-spacing: var(--type-h1-letter-spacing);
        color: var(--text-primary);
        margin-bottom: 16px;
    }
    
    .glass-modal-content-demo p {
        font-family: var(--font-family-base);
        font-size: var(--type-body-lg-size);
        line-height: var(--line-height-relaxed);
        color: var(--text-secondary);
        margin-bottom: 32px;
        max-width: var(--content-max-width-sm);
        margin-left: auto;
        margin-right: auto;
    }
    
    .glass-modal-buttons {
        display: flex;
        gap: 16px;
        justify-content: center;
        flex-wrap: wrap;
    }
    
    /* === Background === */
    .glass-modal-bg {
        position: absolute;
        inset: 0;
        z-index: var(--z-below);
    }
    
    .glass-modal-bg img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.2;
        filter: saturate(0.8) contrast(1.1);
    }
    
    /* === Dark Mode === */
    @media (prefers-color-scheme: dark) {
        .glass-modal-content-demo {
            background: var(--glass-bg-extreme);
            border-color: var(--border-medium);
        }
    }
    
    /* === Responsive === */
    @media (max-width: 1024px) {
        .glass-modal-content-demo {
            padding: 48px 40px;
        }
    }
    
    @media (max-width: 768px) {
        .glass-modal-demo {
            padding: 16px;
        }
        
        .glass-modal-content-demo {
            padding: 40px 32px;
            border-radius: var(--radius-xl);
        }
        
        .glass-modal-code {
            font-size: var(--font-size-2xl);
        }
        
        .glass-modal-buttons {
            flex-direction: column;
        }
        
        .glass-button,
        .glass-button-secondary {
            width: 100%;
            justify-content: center;
        }
    }
    
    @media (max-width: 480px) {
        .glass-modal-content-demo {
            padding: 32px 24px;
            border-radius: var(--radius-lg);
        }
        
        .glass-modal-code {
            font-size: var(--font-size-xl);
        }
        
        .glass-modal-content-demo h1 {
            font-size: var(--font-size-2xl);
        }
    }
    
    @media (max-width: 360px) {
        .glass-modal-code {
            font-size: 40px;
        }
    }
</style>

<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

<!-- Liquid Glass System -->
<link href="liquid-glass-system.css" rel="stylesheet">

<div class="glass-modal-demo">
    <!-- Background -->
    <div class="glass-modal-bg">
        <img src="https://images.unsplash.com/photo-1581092160568-ba69c7a3f42?w=1920&q=80" alt="Background">
    </div>
    
    <!-- Content - Using glass-modal from system -->
    <div class="glass-modal-content-demo">
        <div class="glass-modal-code">404</div>
        
        <h1>Seite nicht gefunden</h1>
        
        <p>Die von Ihnen gesuchte Seite existiert nicht oder wurde verschoben. Kehren Sie zur Startseite zurück oder kontaktieren Sie uns.</p>
        
        <div class="glass-modal-buttons">
            <a href="/" class="glass-button">
                <span class="material-symbols-outlined">home</span>
                Zur Startseite
            </a>
            <a href="#kontakt" class="glass-button glass-button-secondary">
                <span class="material-symbols-outlined">mail</span>
                Kontakt
            </a>
        </div>
    </div>
</div>
