<!-- ============================================
     CONTACT INFO CARDS - Glassmorphism
     Für Elementor: Einfügen als HTML-Widget
     ============================================ -->

<style>
    .sp-info-container {
        max-width: 1280px;
        margin: 0 auto;
        padding: 0 32px;
    }
    
    .sp-info-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 24px;
    }
    
    @media (max-width: 1024px) {
        .sp-info-grid {
            grid-template-columns: repeat(2, 1fr);
        }
    }
    
    @media (max-width: 640px) {
        .sp-info-grid {
            grid-template-columns: 1fr;
        }
    }
    
    /* Info Card */
    .sp-info-card {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: 16px;
        padding: 24px;
        text-align: center;
        box-shadow: 0 8px 32px rgba(0, 113, 188, 0.08);
        transition: all 0.3s ease;
    }
    
    .sp-info-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 40px rgba(0, 113, 188, 0.12);
    }
    
    .sp-info-icon {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: #d1e4ff;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
        transition: transform 0.3s ease;
    }
    
    .sp-info-card:hover .sp-info-icon {
        transform: scale(1.1);
    }
    
    .sp-info-icon .material-symbols-outlined {
        font-size: 24px;
        color: #0071bc;
    }
    
    .sp-info-card h3 {
        font-family: 'DM Sans', sans-serif;
        font-size: 16px;
        font-weight: 600;
        color: #1a1c1e;
        margin-bottom: 8px;
    }
    
    .sp-info-card p {
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        line-height: 1.6;
        color: #404751;
        margin: 0;
    }
    
    /* Responsive */
    @media (max-width: 1024px) {
        .sp-info-card {
            padding: 20px;
        }
    }
    
    @media (max-width: 768px) {
        .sp-info-container {
            padding: 0 16px;
        }
        
        .sp-info-card h3 {
            font-size: 15px;
        }
        
        .sp-info-card p {
            font-size: 13px;
        }
    }
    
    @media (max-width: 640px) {
        .sp-info-card {
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            text-align: left;
        }
        
        .sp-info-icon {
            width: 48px;
            height: 48px;
            margin: 0;
            flex-shrink: 0;
        }
        
        .sp-info-icon .material-symbols-outlined {
            font-size: 20px;
        }
    }
    
    @media (max-width: 480px) {
        .sp-info-card {
            padding: 14px;
        }
        
        .sp-info-card h3 {
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .sp-info-card p {
            font-size: 12px;
        }
    }
    
    @media (max-width: 360px) {
        .sp-info-card h3 {
            font-size: 13px;
        }
    }
</style>

<!-- Material Symbols Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

<div class="sp-info-container">
    <div class="sp-info-grid">
        <!-- Address -->
        <div class="sp-info-card">
            <div class="sp-info-icon">
                <span class="material-symbols-outlined">location_on</span>
            </div>
            <h3>Adresse</h3>
            <p>Dieselstraße 10<br>86556 Küchbach</p>
        </div>
        
        <!-- Phone -->
        <div class="sp-info-card">
            <div class="sp-info-icon">
                <span class="material-symbols-outlined">phone</span>
            </div>
            <h3>Telefon</h3>
            <p>0 82 57 / XX XX XX</p>
        </div>
        
        <!-- Email -->
        <div class="sp-info-card">
            <div class="sp-info-icon">
                <span class="material-symbols-outlined">mail</span>
            </div>
            <h3>E-Mail</h3>
            <p>info@spenglerei-peters.de</p>
        </div>
        
        <!-- Hours -->
        <div class="sp-info-card">
            <div class="sp-info-icon">
                <span class="material-symbols-outlined">schedule</span>
            </div>
            <h3>Öffnungszeiten</h3>
            <p>Mo-Do: 08:00-17:00<br>Fr: 08:00-14:00</p>
        </div>
    </div>
</div>
