<!-- ============================================
     CAREER WORK ENVIRONMENT - Bilder-Grid
     Für Elementor: Einfügen als HTML-Widget
     ============================================ -->

<style>
    .sp-work-container {
        max-width: 1280px;
        margin: 0 auto;
        padding: 0 32px;
    }
    
    .sp-work-header {
        text-align: center;
        margin-bottom: 48px;
    }
    
    .sp-work-header h2 {
        font-family: 'DM Sans', sans-serif;
        font-size: 32px;
        font-weight: 600;
        line-height: 1.3;
        letter-spacing: -0.01em;
        color: #1a1c1e;
        margin-bottom: 16px;
    }
    
    .sp-work-header p {
        font-family: 'DM Sans', sans-serif;
        font-size: 16px;
        line-height: 1.6;
        color: #404751;
        max-width: 600px;
        margin: 0 auto;
    }
    
    /* Bilder Grid */
    .sp-work-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-auto-rows: 250px;
        gap: 24px;
    }
    
    @media (max-width: 1024px) {
        .sp-work-grid {
            grid-template-columns: repeat(2, 1fr);
            grid-auto-rows: 220px;
        }
    }
    
    @media (max-width: 640px) {
        .sp-work-grid {
            grid-template-columns: 1fr;
            grid-auto-rows: 200px;
        }
    }
    
    .sp-work-item {
        position: relative;
        border-radius: 16px;
        overflow: hidden;
        cursor: pointer;
    }
    
    .sp-work-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.7s ease;
    }
    
    .sp-work-item:hover img {
        transform: scale(1.05);
    }
    
    /* Glass Overlay */
    .sp-work-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 20px;
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-top: 1px solid rgba(255, 255, 255, 0.5);
        transform: translateY(100%);
        opacity: 0;
        transition: all 0.3s ease;
    }
    
    .sp-work-item:hover .sp-work-overlay {
        transform: translateY(0);
        opacity: 1;
    }
    
    .sp-work-overlay h3 {
        font-family: 'DM Sans', sans-serif;
        font-size: 18px;
        font-weight: 600;
        color: #1a1c1e;
        margin: 0;
    }
    
    /* Responsive */
    @media (max-width: 1024px) {
        .sp-work-header h2 {
            font-size: 28px;
        }
    }
    
    @media (max-width: 768px) {
        .sp-work-container {
            padding: 0 16px;
        }
        
        .sp-work-header {
            margin-bottom: 32px;
        }
        
        .sp-work-header h2 {
            font-size: 28px;
        }
        
        .sp-work-item {
            border-radius: 12px;
        }
    }
    
    @media (max-width: 640px) {
        .sp-work-header h2 {
            font-size: 26px;
        }
        
        .sp-work-header p {
            font-size: 15px;
        }
        
        .sp-work-overlay {
            padding: 16px;
            transform: translateY(0);
            opacity: 1;
        }
        
        .sp-work-overlay h3 {
            font-size: 16px;
        }
    }
    
    @media (max-width: 480px) {
        .sp-work-header h2 {
            font-size: 24px;
        }
        
        .sp-work-grid {
            gap: 12px;
        }
        
        .sp-work-item {
            border-radius: 10px;
        }
    }
    
    @media (max-width: 360px) {
        .sp-work-header h2 {
            font-size: 22px;
        }
    }
</style>

<div class="sp-work-container">
    <div class="sp-work-header">
        <h2>Unsere Arbeitsumgebung</h2>
        <p>Moderne Werkstatt und spannende Projekte – entdecken Sie, wo wir arbeiten.</p>
    </div>
    
    <div class="sp-work-grid">
        <!-- Item 1 -->
        <div class="sp-work-item">
            <img src="https://images.unsplash.com/photo-1581092160605-ba69c7a3f42?w=600&q=80" alt="Werkstatt">
            <div class="sp-work-overlay">
                <h3>Moderne Werkstatt</h3>
            </div>
        </div>
        
        <!-- Item 2 -->
        <div class="sp-work-item">
            <img src="https://images.unsplash.com/photo-1504307651254-35680f356dfd?w=600&q=80" alt="Projekt">
            <div class="sp-work-overlay">
                <h3>Aktuelles Projekt</h3>
            </div>
        </div>
        
        <!-- Item 3 -->
        <div class="sp-work-item">
            <img src="https://images.unsplash.com/photo-1504384305-0ae758c2b78?w=600&q=80" alt="Team">
            <div class="sp-work-overlay">
                <h3>Team bei der Arbeit</h3>
            </div>
        </div>
        
        <!-- Item 4 -->
        <div class="sp-work-item">
            <img src="https://images.unsplash.com/photo-1581092160568-ba69c7a3f42?w=600&q=80" alt="Maschinen">
            <div class="sp-work-overlay">
                <h3>Präzisionsmaschinen</h3>
            </div>
        </div>
        
        <!-- Item 5 -->
        <div class="sp-work-item">
            <img src="https://images.unsplash.com/photo-1504384305-0ae758c2b78?w=600&q=80" alt="Material">
            <div class="sp-work-overlay">
                <h3>Materiallager</h3>
            </div>
        </div>
        
        <!-- Item 6 -->
        <div class="sp-work-item">
            <img src="https://images.unsplash.com/photo-1581092160605-ba69c7a3f42?w=600&q=80" alt="Büro">
            <div class="sp-work-overlay">
                <h3>Büro & Planung</h3>
            </div>
        </div>
    </div>
</div>
